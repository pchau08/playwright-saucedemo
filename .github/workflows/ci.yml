name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BASE_URL: https://www.saucedemo.com
  NODE_VERSION: '20'

jobs:
  # ─── Smoke Tests ─────────────────────────────────────────────────────────────
  # Fast sanity check — runs on every push and PR.
  # Chromium only, smoke-tagged tests, no retries to keep feedback fast.

  smoke:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=chromium
        env:
          BASE_URL: ${{ env.BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Full Regression ──────────────────────────────────────────────────────────
  # Complete test suite across all browsers.
  # Runs after smoke passes. Uploads Allure report on every run.

  regression:
    name: Full Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run full regression — ${{ matrix.browser }}
        run: npx playwright test --grep @regression --project=${{ matrix.browser }}
        env:
          BASE_URL: ${{ env.BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CI: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json-${{ matrix.browser }}
          path: reports/results.json
          retention-days: 30

  # ─── Allure Report ────────────────────────────────────────────────────────────
  # Merge per-browser Allure results and publish a combined report.
  # Runs after all regression matrix jobs complete.

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: regression
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/

      - name: Set up Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate combined Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload combined Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: allure-report/
          retention-days: 30
